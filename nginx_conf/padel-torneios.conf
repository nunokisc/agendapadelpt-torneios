##
## Padel Torneios — Next.js
## App corre em: http://127.0.0.1:3004   (pm2: padel_torneios)
## Substituir "torneios.example.com" pelo domínio real.
##

proxy_cache_path /var/cache/nginx/padel_torneios
    levels=1:2
    keys_zone=padel_torneios_cache:10m
    max_size=256m
    inactive=1h
    use_temp_path=off;

server {
    listen 80;
    server_name torneios.example.com;

    # Redirecionar HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    server_name torneios.example.com;

    listen 443 ssl;
    http2 on;

    ssl_certificate     /etc/letsencrypt/live/torneios.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/torneios.example.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    access_log /var/log/nginx/padel_torneios.log main;

    # ─── Security headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options        "SAMEORIGIN";
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy        "strict-origin";
    add_header X-XSS-Protection       "1; mode=block";
    add_header Permissions-Policy     "geolocation=(),midi=(),sync-xhr=(),microphone=(),camera=(),magnetometer=(),gyroscope=(),fullscreen=(self),payment=()";
    add_header Content-Security-Policy
        "default-src 'self'; font-src * data:; img-src * data: blob:; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; connect-src 'self';"
        always;

    # ─── Next.js static assets: imutáveis, cache 1 ano ─────────────────────────
    location /_next/static/ {
        proxy_pass         http://127.0.0.1:3004;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_cache            padel_torneios_cache;
        proxy_cache_valid      200 365d;
        proxy_cache_use_stale  error timeout updating;

        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Cache       $upstream_cache_status;
    }

    # ─── Service Worker: NUNCA em cache (precisa de ser refrescado a cada deploy) ─
    location = /sw.js {
        proxy_pass         http://127.0.0.1:3004;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_no_cache     1;
        proxy_cache_bypass 1;

        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma        "no-cache";
        expires    -1;
    }

    # ─── Ficheiros estáticos públicos ──────────────────────────────────────────
    location ~* \.(ico|png|jpg|jpeg|webp|svg|gif|woff2|woff|ttf|css|js|json|xml|txt)$ {
        proxy_pass         http://127.0.0.1:3004;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_cache        padel_torneios_cache;
        proxy_cache_valid  200 6h;
        proxy_cache_valid  404 5m;

        expires 6h;
        add_header Cache-Control "public";
        add_header X-Cache       $upstream_cache_status;
    }

    # ─── Aplicação Next.js (todas as rotas) ────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3004;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Sem cache nas rotas dinâmicas (admin, API, SSR com token)
        proxy_no_cache     1;
        proxy_cache_bypass 1;

        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
